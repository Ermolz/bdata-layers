name: Deploy ML Map to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/deploy-ml-map-pages.yml"
      - "data/ml/maps/traffic_predictions_map.html"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp "data/ml/maps/traffic_predictions_map.html" "_site/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
